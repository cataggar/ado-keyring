[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "devops-keyring"
version = "0.1.0"
requires-python = ">=3.9"
dependencies = ["keyring>=23.0", "requests>=2.28"]

[project.entry-points."keyring.backends"]
devops-keyring = "devops_keyring:DevOpsKeyring"

[tool.hatch.build.targets.wheel]
packages = ["python/devops_keyring"]
