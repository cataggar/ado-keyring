[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "devops-keyring"
version = "0.1.0"
requires-python = ">=3.9"
dependencies = ["keyring>=23.0"]

[project.entry-points."keyring.backends"]
devops-keyring = "devops_keyring:DevOpsKeyring"

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "python"
module-name = "devops_keyring._native"
